name: proveria

services:
  postgres:
    image: postgres:17-alpine
    container_name: proveria-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proveria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proveria_dev}
      POSTGRES_DB: ${POSTGRES_DB:-proveria}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U "${POSTGRES_USER:-proveria}" -d "${POSTGRES_DB:-proveria}"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - proveria

  redis:
    image: redis:7-alpine
    container_name: proveria-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - proveria

  minio:
    image: minio/minio:latest
    container_name: proveria-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-proveria}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-proveria_dev_minio}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:9000/minio/health/live || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - proveria

  # One-shot bucket bootstrap. Runs after minio is healthy, creates the canonical
  # artifacts bucket, enables versioning (docs/v1 §25.1), then exits.
  minio-init:
    image: minio/mc:latest
    container_name: proveria-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-proveria}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-proveria_dev_minio}
      MINIO_ARTIFACTS_BUCKET: ${MINIO_ARTIFACTS_BUCKET:-proveria-artifacts}
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      mc mb --ignore-existing local/\"$$MINIO_ARTIFACTS_BUCKET\";
      mc version enable local/\"$$MINIO_ARTIFACTS_BUCKET\";
      echo \"proveria: bucket $$MINIO_ARTIFACTS_BUCKET ready (versioning enabled).\";
      "
    networks:
      - proveria
    restart: 'no'

  # ---------------------------------------------------------------------
  # Application services — opt-in via `--profile app`.
  #
  # The data stores above start unconditionally so the existing
  # `docker compose up -d` + `pnpm dev` workflow still works (fastest
  # iteration loop). The app services below only come up when you run
  # `docker compose --profile app up` — used for one-command demos,
  # CI-style smokes, or onboarding a new dev.
  # ---------------------------------------------------------------------

  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: proveria-api
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-proveria}:${POSTGRES_PASSWORD:-proveria_dev}@postgres:5432/${POSTGRES_DB:-proveria}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-proveria}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-proveria_dev_minio}
      S3_FORCE_PATH_STYLE: 'true'
      S3_ARTIFACTS_BUCKET: ${MINIO_ARTIFACTS_BUCKET:-proveria-artifacts}
      SESSION_SECRET: ${SESSION_SECRET:-proveria_dev_session_secret_change_me}
      PROVERIA_PLATFORM_ADMINS: ${PROVERIA_PLATFORM_ADMINS:-}
    ports:
      - '${API_PORT:-3001}:3001'
    networks:
      - proveria

  worker:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: proveria-worker
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${POSTGRES_USER:-proveria}:${POSTGRES_PASSWORD:-proveria_dev}@postgres:5432/${POSTGRES_DB:-proveria}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-proveria}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-proveria_dev_minio}
      S3_FORCE_PATH_STYLE: 'true'
      S3_ARTIFACTS_BUCKET: ${MINIO_ARTIFACTS_BUCKET:-proveria-artifacts}
      # Verification base URL the worker prints into PDFs/QRs needs to
      # be where the consumer's browser can reach the verifier web app —
      # that's the host, not the docker network.
      VERIFICATION_BASE_URL: ${VERIFICATION_BASE_URL:-http://localhost:3003}
    networks:
      - proveria

  verifier:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/verifier/Dockerfile
    container_name: proveria-verifier
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      # The verifier proxies /api/* to the api via its next.config rewrite.
      # Inside the docker network the api is reachable as `api:3001`.
      VERIFIER_API_ORIGIN: http://api:3001
    ports:
      - '${VERIFIER_PORT:-3003}:3003'
    networks:
      - proveria

volumes:
  postgres-data:
    name: proveria-postgres-data
  redis-data:
    name: proveria-redis-data
  minio-data:
    name: proveria-minio-data

networks:
  proveria:
    name: proveria
